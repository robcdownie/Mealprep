<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Back of House">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F1E9">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#20241C">
<title>Back of House · Round 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg: oklch(96.5% 0.012 105);
  --surface: oklch(99.2% 0.004 100);
  --surface-2: oklch(94.2% 0.014 108);
  --hairline: oklch(45% 0.018 120 / 0.16);
  --ink: oklch(23% 0.022 125);
  --ink-2: oklch(46% 0.02 122);
  --ink-3: oklch(59% 0.015 120);
  --olive: oklch(46% 0.078 128);
  --olive-deep: oklch(36% 0.062 128);
  --olive-soft: oklch(46% 0.078 128 / 0.14);
  --on-olive: oklch(98.5% 0.006 100);
  --orange: oklch(62% 0.15 47);
  --orange-deep: oklch(50% 0.135 45);
  --orange-soft: oklch(62% 0.15 47 / 0.15);
  --ok: oklch(51% 0.1 145);
  --ok-soft: oklch(51% 0.1 145 / 0.14);
  --warn: oklch(55% 0.115 72);
  --warn-soft: oklch(62% 0.115 78 / 0.17);
  --over: oklch(51% 0.17 27);
  --over-soft: oklch(56% 0.17 27 / 0.13);
  --glass: oklch(98.5% 0.006 100 / 0.6);
  --glass-strong: oklch(98.5% 0.006 100 / 0.78);
  --glass-brd: oklch(35% 0.02 120 / 0.12);
  --spec: oklch(100% 0 0 / 0.7);
  --scrim: oklch(22% 0.02 120 / 0.34);
  --shadow-float: 0 18px 44px -16px oklch(25% 0.035 120 / 0.4);
  --shadow-soft: 0 10px 30px -14px oklch(25% 0.03 120 / 0.28);
  --blob-a: oklch(85% 0.07 132 / 0.55);
  --blob-b: oklch(88% 0.08 68 / 0.5);
  --blob-c: oklch(91% 0.045 98 / 0.55);
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px; --s7: 48px;
  --r-lg: 26px; --r-md: 18px; --r-sm: 12px;
  --spring: cubic-bezier(0.3, 0.72, 0.26, 1);
  --disp: 'Bricolage Grotesque', -apple-system, Georgia, serif;
  color-scheme: light dark;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg: oklch(18% 0.014 135);
    --surface: oklch(23.5% 0.014 130);
    --surface-2: oklch(29% 0.016 130);
    --hairline: oklch(90% 0.01 120 / 0.12);
    --ink: oklch(94% 0.008 110);
    --ink-2: oklch(72% 0.014 115);
    --ink-3: oklch(57% 0.012 115);
    --olive: oklch(72% 0.085 130);
    --olive-deep: oklch(60% 0.08 130);
    --olive-soft: oklch(72% 0.085 130 / 0.16);
    --on-olive: oklch(17% 0.02 130);
    --orange: oklch(72% 0.14 50);
    --orange-deep: oklch(78% 0.13 55);
    --orange-soft: oklch(72% 0.14 50 / 0.18);
    --ok: oklch(72% 0.11 148);
    --ok-soft: oklch(72% 0.11 148 / 0.16);
    --warn: oklch(76% 0.12 80);
    --warn-soft: oklch(76% 0.12 80 / 0.14);
    --over: oklch(67% 0.165 29);
    --over-soft: oklch(67% 0.165 29 / 0.16);
    --glass: oklch(24% 0.016 130 / 0.6);
    --glass-strong: oklch(24% 0.016 130 / 0.8);
    --glass-brd: oklch(95% 0.01 110 / 0.14);
    --spec: oklch(100% 0 0 / 0.13);
    --scrim: oklch(8% 0.01 130 / 0.5);
    --shadow-float: 0 18px 44px -14px oklch(5% 0.01 130 / 0.7);
    --shadow-soft: 0 10px 30px -12px oklch(5% 0.01 130 / 0.5);
    --blob-a: oklch(34% 0.06 136 / 0.55);
    --blob-b: oklch(33% 0.065 58 / 0.45);
    --blob-c: oklch(29% 0.04 100 / 0.5);
  }
}

/* ============ BASE ============ */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--ink);
  font-size:17px; line-height:1.45;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(112px + env(safe-area-inset-bottom));
  overscroll-behavior-y: none;
}
button{ font:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer; text-align:left; }
input{ font:inherit; color:inherit; }
h1,h2,h3{ font-family: var(--disp); margin:0; }
:focus-visible{ outline:2px solid var(--olive); outline-offset:2px; border-radius:6px; }
::selection{ background: var(--olive-soft); }

/* Ambient field: gives the glass something to refract */
.ambient{ position:fixed; inset:-20%; z-index:-1; pointer-events:none;
  background:
    radial-gradient(42% 34% at 12% 8%,  var(--blob-a), transparent 70%),
    radial-gradient(38% 30% at 88% 20%, var(--blob-b), transparent 70%),
    radial-gradient(50% 40% at 50% 92%, var(--blob-c), transparent 72%);
  animation: drift 70s ease-in-out infinite alternate;
}
@keyframes drift{
  from{ transform: translate3d(-1.5%, -1%, 0) scale(1); }
  to{   transform: translate3d(1.5%, 1.5%, 0) scale(1.05); }
}

/* Shared glass recipe: chrome layer only */
.glass{
  background: var(--glass);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  backdrop-filter: blur(22px) saturate(180%);
  border: 1px solid var(--glass-brd);
  box-shadow: inset 0 1px 0 var(--spec), var(--shadow-soft);
}

/* ============ TOP BAR + LARGE TITLE ============ */
.topbar{ position:fixed; top:0; left:0; right:0; z-index:30;
  padding-top: env(safe-area-inset-top); height: calc(48px + env(safe-area-inset-top));
  display:flex; align-items:center; justify-content:center;
  background: transparent; border-bottom:1px solid transparent;
  transition: background .3s, border-color .3s, box-shadow .3s;
}
.topbar .tb-title{ font-family:var(--disp); font-weight:700; font-size:17px;
  opacity:0; transform: translateY(6px); transition: opacity .25s, transform .25s var(--spring); }
.topbar.scrolled{
  background: var(--glass);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  backdrop-filter: blur(22px) saturate(180%);
  border-bottom-color: var(--hairline);
  box-shadow: inset 0 1px 0 var(--spec);
}
.topbar.scrolled .tb-title{ opacity:1; transform:none; }

main{ padding: calc(52px + env(safe-area-inset-top)) var(--s4) 0; max-width:640px; margin:0 auto; }
.lt-wrap{ padding: var(--s3) var(--s1) var(--s4); }
.eyebrow{ font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); }
.lt{ font-size:36px; font-weight:800; letter-spacing:-0.015em; line-height:1.05; margin-top:2px; }

/* ============ CHIPS (shop picker) ============ */
.chips{ display:flex; gap:var(--s2); overflow-x:auto; margin:0 calc(-1 * var(--s4)) var(--s4);
  padding:2px var(--s4) var(--s2); scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.chips::-webkit-scrollbar{ display:none; }
.chip{ flex:0 0 auto; padding:9px 16px; border-radius:999px; font-weight:600; font-size:15px;
  background:var(--surface); border:1px solid var(--hairline); color:var(--ink-2);
  transition: transform .15s var(--spring), background .2s, color .2s; }
.chip:active{ transform:scale(0.95); }
.chip.on{ background:var(--olive); border-color:var(--olive); color:var(--on-olive); font-weight:700;
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.25), 0 6px 16px -8px var(--olive); }

/* ============ SEGMENTED CONTROL ============ */
.segc{ --i:0; position:relative; display:grid; grid-template-columns: repeat(var(--n,2), 1fr);
  padding:3px; border-radius:999px; margin-bottom:var(--s4);
  background: var(--glass);
  -webkit-backdrop-filter: blur(18px) saturate(170%);
  backdrop-filter: blur(18px) saturate(170%);
  border:1px solid var(--glass-brd);
  box-shadow: inset 0 1px 0 var(--spec);
}
.seg-thumb{ position:absolute; top:3px; bottom:3px; left:3px;
  width: calc((100% - 6px) / var(--n,2));
  transform: translateX(calc(var(--i) * 100%));
  border-radius:999px; background:var(--surface);
  border:0.5px solid var(--hairline);
  box-shadow: inset 0 1px 0 var(--spec), 0 3px 10px -3px oklch(20% 0.03 120 / 0.35);
  transition: transform .38s var(--spring);
}
.segc.noanim .seg-thumb{ transition:none; }
.seg-opt{ position:relative; z-index:1; text-align:center; padding:10px 8px;
  font-weight:600; font-size:15px; color:var(--ink-2); white-space:nowrap;
  border-radius:999px; transition: color .2s; }
.seg-opt.on{ color:var(--ink); font-weight:700; }

/* ============ BUDGET GAUGE ============ */
.gauge{ position:sticky; top: calc(52px + env(safe-area-inset-top)); z-index:20;
  border-radius: var(--r-lg); padding: var(--s4) var(--s4) var(--s4); margin-bottom: var(--s5);
  background: var(--glass-strong);
  -webkit-backdrop-filter: blur(24px) saturate(190%);
  backdrop-filter: blur(24px) saturate(190%);
  border:1px solid var(--glass-brd);
  box-shadow: inset 0 1px 0 var(--spec), var(--shadow-float);
  transition: box-shadow .3s;
}
.gauge::before{ content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background: transparent; transition: background .35s; }
.gauge.warn::before{ background: var(--warn-soft); }
.gauge.over::before{ background: var(--over-soft); }
.gauge > *{ position:relative; }
.gauge-top{ display:flex; justify-content:space-between; align-items:flex-end; gap:var(--s3); }
.gauge-lbl{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.09em; color:var(--ink-3); }
.gauge-num{ font-family:var(--disp); font-size:38px; font-weight:800; line-height:1;
  font-variant-numeric: tabular-nums; letter-spacing:-0.01em; margin-top:3px;
  transition: color .3s; }
.gauge-num.sm{ font-size:21px; font-weight:700; color:var(--ink-2); }
.gauge.warn .gauge-num.main{ color:var(--warn); }
.gauge.over .gauge-num.main{ color:var(--over); }
.bar{ height:8px; background: var(--surface-2); border-radius:999px; margin-top:var(--s4);
  position:relative; overflow:hidden; box-shadow: inset 0 1px 2px oklch(20% 0.02 120 / 0.12); }
.bar-est, .bar-fill{ position:absolute; inset:0 auto 0 0; border-radius:999px;
  background: var(--olive); transition: width .5s var(--spring), background .3s; }
.bar-est{ opacity:0.3; }
.gauge.warn .bar-est, .gauge.warn .bar-fill{ background:var(--warn); }
.gauge.over .bar-est, .gauge.over .bar-fill{ background:var(--over); }
.gauge-meta{ font-size:13.5px; color:var(--ink-2); margin-top:var(--s2); font-variant-numeric:tabular-nums; }
.gauge-actions{ display:flex; gap:var(--s2); margin-top:var(--s3); align-items:center; }
.pill-btn{ font-size:14px; font-weight:600; padding:9px 15px; border-radius:999px; min-height:38px;
  background:var(--surface); border:1px solid var(--hairline); color:var(--ink-2);
  transition: transform .15s var(--spring), background .2s, color .2s, border-color .2s; }
.pill-btn:active{ transform:scale(0.95); }
.pill-btn.hot{ background:var(--over); border-color:var(--over); color:var(--on-olive); font-weight:700; }
.tgt-input{ width:84px; border:1px solid var(--olive); border-radius:999px; padding:8px 14px;
  font-weight:700; background:var(--surface); font-size:14px; }

/* ============ GROUPED LISTS ============ */
.sec{ margin-bottom: var(--s5); }
.sec-h{ width:100%; display:flex; justify-content:space-between; align-items:center;
  padding: 0 var(--s2) var(--s2); }
.sec-h .sec-nm{ font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-3); }
.sec-h .cnt{ font-size:13px; font-weight:600; color:var(--ink-3); font-variant-numeric:tabular-nums;
  display:flex; align-items:center; gap:6px; }
.sec-h .chev{ transition: transform .3s var(--spring); display:inline-flex; }
.sec-h .chev.open{ transform: rotate(90deg); }
.group{ background:var(--surface); border-radius: var(--r-md); overflow:hidden;
  border:0.5px solid var(--hairline); box-shadow: 0 1px 2px oklch(25% 0.02 120 / 0.05); }
.row{ display:flex; align-items:center; gap:var(--s3); padding: var(--s3) var(--s3); min-height:62px;
  position:relative; transition: background .25s; }
.row + .row::before{ content:''; position:absolute; top:0; left:64px; right:0; height:0.5px; background:var(--hairline); }
.row.done{ background: var(--olive-soft); }
.row.done .nm{ text-decoration: line-through; text-decoration-color: var(--ink-3); color:var(--ink-2); }
.row.skipped{ opacity:0.55; }
.row.skipped .nm{ text-decoration: line-through; }
.row .mid{ flex:1; min-width:0; }
.row .nm{ font-weight:600; font-size:16px; letter-spacing:-0.005em; }
.row .nt{ font-size:13px; color:var(--ink-2); margin-top:1px; }
.row .nt .skiplbl{ color:var(--over); font-weight:700; }

/* Check circles */
.ck{ width:30px; height:30px; min-width:30px; border-radius:50%;
  border:1.8px solid var(--ink-3); display:flex; align-items:center; justify-content:center;
  color:var(--on-olive); transition: background .2s, border-color .2s, transform .15s var(--spring);
  margin: 0 var(--s1); }
.ck:active{ transform:scale(0.85); }
.ck svg{ opacity:0; transform:scale(0.5); transition: opacity .15s, transform .2s var(--spring); }
.done > .ck, .ck.checked{ background:var(--olive); border-color:var(--olive); }
.done > .ck svg, .ck.checked svg{ opacity:1; transform:scale(1); }
.pop-in{ animation: pop .34s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes pop{ 0%{ transform:scale(0.7); } 60%{ transform:scale(1.06); } 100%{ transform:scale(1); } }

/* Price chip */
.price{ min-width:68px; text-align:center; font-weight:700; font-variant-numeric:tabular-nums;
  padding:9px 10px; border-radius:999px; background:var(--surface-2); font-size:15px;
  transition: background .2s, color .2s, transform .15s var(--spring); }
.price:active{ transform:scale(0.94); }
.price.entered{ background:var(--orange-soft); color:var(--orange-deep); }
.price input{ width:56px; border:none; background:transparent; text-align:center; font-weight:700; padding:0; }
.price input:focus{ outline:none; }

/* ============ SHEET ============ */
.sheet-wrap{ position:fixed; inset:0; z-index:50; }
.sheet-scrim{ position:absolute; inset:0; background:var(--scrim);
  -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  opacity:0; transition: opacity .3s; }
.sheet{ position:absolute; left:0; right:0; bottom:0; max-height:80vh; overflow-y:auto;
  background: var(--glass-strong);
  -webkit-backdrop-filter: blur(28px) saturate(190%);
  backdrop-filter: blur(28px) saturate(190%);
  border-radius: 28px 28px 0 0; border-top:1px solid var(--glass-brd);
  box-shadow: inset 0 1px 0 var(--spec), 0 -20px 60px -20px oklch(10% 0.02 120 / 0.5);
  padding: var(--s2) var(--s4) calc(var(--s6) + env(safe-area-inset-bottom));
  transform: translateY(103%); transition: transform .42s var(--spring);
  overscroll-behavior: contain;
}
.sheet-wrap.in .sheet-scrim{ opacity:1; }
.sheet-wrap.in .sheet{ transform: translateY(0); }
.grabber{ width:38px; height:5px; border-radius:999px; background:var(--ink-3); opacity:0.45;
  margin: var(--s2) auto var(--s4); display:block; border:none; padding:0; cursor:pointer; }
.sheet h2{ font-size:23px; font-weight:800; letter-spacing:-0.01em; }
.sheet .sub{ font-size:14px; color:var(--ink-2); margin: var(--s2) 0 var(--s3); }
.tierlbl{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.09em;
  color:var(--ink-3); margin: var(--s5) var(--s1) var(--s2); }
.tgroup{ background: var(--surface); border-radius: var(--r-md); overflow:hidden; border:0.5px solid var(--hairline); }
.trow{ display:flex; align-items:center; gap:var(--s3); padding: var(--s3); position:relative; }
.trow + .trow::before{ content:''; position:absolute; top:0; left:var(--s3); right:0; height:0.5px; background:var(--hairline); }
.trow .mid{ flex:1; min-width:0; }
.trow .nm{ font-weight:600; font-size:15.5px; }
.trow .why{ font-size:13px; color:var(--ink-2); }
.trow .sv{ font-weight:700; font-variant-numeric:tabular-nums; color:var(--olive-deep); min-width:52px; text-align:right; font-size:15px; }
.skipbtn{ font-size:14px; font-weight:600; padding:9px 14px; border-radius:999px; min-height:38px;
  border:1px solid var(--over); color:var(--over); background:transparent;
  transition: transform .15s var(--spring); }
.skipbtn:active{ transform:scale(0.94); }
.skipbtn.undo{ border-color:var(--olive); color:var(--olive-deep); }

/* ============ COOK ============ */
.wake{ display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--ink-2);
  padding:7px 14px; border-radius:999px; margin-bottom:var(--s4);
  background:var(--glass); -webkit-backdrop-filter: blur(16px) saturate(170%); backdrop-filter: blur(16px) saturate(170%);
  border:1px solid var(--glass-brd); box-shadow: inset 0 1px 0 var(--spec); }
.wake .dot{ width:8px; height:8px; border-radius:50%; background:var(--ink-3); transition: background .3s; }
.wake.on .dot{ background:var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }
.ses-h{ font-size:23px; font-weight:800; letter-spacing:-0.01em; }
.snote{ font-size:14.5px; color:var(--ink-2); margin: var(--s2) 0 var(--s4); line-height:1.5; }

.prep-group{ background:var(--surface); border-radius:var(--r-md); overflow:hidden;
  border:0.5px solid var(--hairline); margin-bottom:var(--s4); }
.prep{ display:flex; align-items:flex-start; gap:var(--s3); padding:var(--s4) var(--s3); width:100%; position:relative; }
.prep + .prep::before{ content:''; position:absolute; top:0; left:64px; right:0; height:0.5px; background:var(--hairline); }
.prep .ck{ border-radius:9px; margin-top:1px; }
.prep.done{ background: var(--olive-soft); }
.prep.done .tx{ color:var(--ink-2); }
.prep .tx{ flex:1; font-size:15.5px; line-height:1.5; }
.vtag{ display:inline-block; font-size:11px; font-weight:700; letter-spacing:0.05em;
  background:var(--olive-soft); color:var(--olive-deep); border-radius:6px; padding:2px 7px;
  margin:0 1px; vertical-align:1px; }
@media (prefers-color-scheme: dark){ .vtag{ color:var(--olive); } }

/* Ticket rail */
.rail-h{ display:flex; align-items:center; gap:var(--s3); margin: var(--s2) var(--s1) var(--s3); }
.rail-h .ln{ flex:1; height:1px; background:var(--hairline); }
.rail-h span{ font-size:11.5px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-3); }
.ticket{ position:relative; width:100%; background:var(--surface);
  border:0.5px solid var(--hairline); border-radius: 10px var(--r-md) var(--r-md) 10px;
  padding: var(--s4) var(--s4) var(--s4) 30px; margin-bottom:var(--s3); display:block;
  box-shadow: 0 1px 2px oklch(25% 0.02 120 / 0.05);
  transition: transform .18s var(--spring), border-color .25s, background .25s, box-shadow .25s, opacity .25s; }
.ticket:active{ transform:scale(0.985); }
.ticket::before{ content:''; position:absolute; left:11px; top:18px; width:8px; height:8px; border-radius:50%;
  background:var(--bg); border:1.5px solid var(--ink-3); transition: background .25s, border-color .25s; }
.ticket.active{ border-color:var(--orange); background: var(--orange-soft);
  box-shadow: 0 10px 28px -12px var(--orange), inset 0 1px 0 var(--spec); }
.ticket.active::before{ border-color:var(--orange); background:var(--orange); animation: firing 1.4s ease-in-out infinite; }
@keyframes firing{ 0%,100%{ box-shadow: 0 0 0 0 var(--orange-soft); } 50%{ box-shadow: 0 0 0 6px var(--orange-soft); } }
.ticket.done{ opacity:0.48; }
.ticket.done::before{ background:var(--olive); border-color:var(--olive); }
.t-top{ display:flex; align-items:center; gap:var(--s2); margin-bottom:6px; flex-wrap:wrap; }
.t-num{ font-family:var(--disp); font-weight:800; font-size:14px; color:var(--ink-3); font-variant-numeric:tabular-nums; }
.t-type{ font-size:10.5px; font-weight:700; letter-spacing:0.08em; padding:3px 9px; border-radius:999px;
  background:var(--surface-2); color:var(--ink-2); }
.t-type.grill, .t-type.stove{ background:var(--orange-soft); color:var(--orange-deep); }
.t-type.braise{ background:var(--olive-soft); color:var(--olive-deep); }
@media (prefers-color-scheme: dark){ .t-type.braise{ color:var(--olive); } }
.t-type.seal{ background:var(--ok-soft); color:var(--ok); }
.t-type.close{ background:var(--ink); color:var(--bg); }
.t-dur{ margin-left:auto; font-size:12.5px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--ink-3); }
.t-title{ font-family:var(--disp); font-size:19px; font-weight:700; line-height:1.2; letter-spacing:-0.005em; }
.ticket.done .t-title{ text-decoration:line-through; }
.t-detail{ font-size:14.5px; color:var(--ink-2); margin-top:5px; line-height:1.5; }
.t-detail b, .prep .tx b{ color:var(--ink); }
.t-state{ display:inline-block; margin-top:var(--s2); font-size:10.5px; font-weight:800; letter-spacing:0.12em;
  color:var(--orange-deep); }
.ticket.done .t-state{ color:var(--olive-deep); }
@media (prefers-color-scheme: dark){ .ticket.done .t-state{ color:var(--olive); } }

/* ============ FREEZER ============ */
.fz-head{ text-align:center; margin: var(--s3) 0 var(--s5); }
.fz-count{ font-family:var(--disp); font-size:56px; font-weight:800; line-height:1;
  font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }
.fz-count .of{ font-size:24px; font-weight:700; color:var(--ink-3); letter-spacing:0; }
.fz-sub{ font-size:14px; color:var(--ink-2); font-weight:600; margin-top:var(--s2); }
.fz-done{ color:var(--ok); font-weight:700; }
.fz-track{ height:6px; max-width:220px; margin: var(--s3) auto 0; background:var(--surface-2);
  border-radius:999px; overflow:hidden; }
.fz-track i{ display:block; height:100%; background:var(--olive); border-radius:999px;
  transition: width .5s var(--spring); }
.fz-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:var(--s2); }
.bag{ min-height:76px; border-radius:var(--r-md); background:var(--surface);
  border:0.5px solid var(--hairline); padding:var(--s3);
  display:flex; flex-direction:column; justify-content:center;
  transition: transform .16s var(--spring), background .25s, border-color .25s, box-shadow .25s; }
.bag:active{ transform:scale(0.95); }
.bag .d{ font-family:var(--disp); font-weight:800; font-size:16px; }
.bag .n{ font-size:12px; color:var(--ink-2); line-height:1.3; margin-top:2px; }
.bag.in{ background: linear-gradient(160deg, var(--olive), var(--olive-deep));
  border-color: transparent;
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.25), 0 8px 20px -10px var(--olive-deep); }
.bag.in .d, .bag.in .n{ color:var(--on-olive); }
.bag.in .n{ opacity:0.8; }

/* ============ TAB BAR ============ */
.tabbar{ position:fixed; left:var(--s4); right:var(--s4); bottom: calc(var(--s3) + env(safe-area-inset-bottom));
  z-index:40; display:flex; max-width:420px; margin:0 auto;
  border-radius:999px; padding:5px;
  background: var(--glass);
  -webkit-backdrop-filter: blur(24px) saturate(190%);
  backdrop-filter: blur(24px) saturate(190%);
  border:1px solid var(--glass-brd);
  box-shadow: inset 0 1px 0 var(--spec), var(--shadow-float);
}
.tb{ flex:1; position:relative; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 4px 7px; color:var(--ink-3); border-radius:999px;
  transition: color .25s, transform .15s var(--spring); }
.tb:active{ transform:scale(0.93); }
.tb .tb-pill{ position:absolute; inset:0; border-radius:999px; background:var(--olive-soft);
  view-transition-name: tabpill; }
.tb svg, .tb .tb-lb{ position:relative; }
.tb .tb-lb{ font-size:10.5px; font-weight:700; letter-spacing:0.02em; }
.tb.on{ color:var(--olive-deep); }
@media (prefers-color-scheme: dark){ .tb.on{ color:var(--olive); } }

.empty{ text-align:center; color:var(--ink-2); padding:var(--s6) var(--s4); font-size:15px; }

/* ============ VIEW TRANSITIONS + MOTION ============ */
::view-transition-old(root), ::view-transition-new(root){ animation-duration: .22s; }
::view-transition-group(tabpill){ animation-duration: .35s; animation-timing-function: var(--spring); }
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ transition:none !important; animation:none !important; }
}

const K = "bohR2";
let S = { tab:"shop", shop:"big", session:1, phase:"prep", checks:{}, prices:{}, skips:{}, fire:{}, prep:{}, bags:{}, coll:{}, target: DATA.budgetDefault, editing:null, editTarget:false, sheet:false };
try { const raw = localStorage.getItem(K); if (raw) S = Object.assign(S, JSON.parse(raw)); } catch(e) {}
S.editing = null; S.editTarget = false; S.sheet = false;
function save(){ try { localStorage.setItem(K, JSON.stringify(S)); } catch(e) {} }

/* Transient UI state: never persisted */
const T = { pop:null, prevProj:null, prevSpent:null, prevSpentW:null, prevProjW:null };
const RM = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const TITLES = { shop:"Shop", cook:"Cook", freeze:"Freezer" };

const V = el => document.getElementById(el);
const vfy = s => s.replace(/\{([A-Z ]+)\}/g, '<span class="vtag">$1</span>');
function fmt$(n){ return "$" + (Math.round(n*100)%100 === 0 ? Math.round(n) : n.toFixed(2)); }
function priceOf(it){ return (S.prices[it.id] !== undefined) ? S.prices[it.id] : it.e; }
function allItems(){ const out=[]; DATA.shops.forEach(sh => sh.sections.forEach(sec => sec.items.forEach(it => out.push(it)))); return out; }
function calc(){
  let spent=0, left=0;
  allItems().forEach(it => {
    if (S.checks[it.id]) spent += priceOf(it);
    else if (!S.skips[it.id]) left += priceOf(it);
  });
  const proj = spent + left;
  const state = proj > S.target ? "over" : (proj > S.target - 30 ? "warn" : "ok");
  return { spent, left, proj, state };
}

const CKSVG = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.8 8.6l3.3 3.3L13.2 4.6"/></svg>';
const CHEV = '<svg width="8" height="13" viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1.5 1.5l5 5-5 5"/></svg>';

/* View transition wrapper: tab-level moves only */
function vt(fn){
  if (RM || !document.startViewTransition){ fn(); return; }
  document.startViewTransition(fn);
}
/* Segmented control thumb glide across re-renders */
function glide(cid, from, to){
  if (RM) return;
  const c = V(cid); if (!c) return;
  c.classList.add("noanim"); c.style.setProperty("--i", from);
  void c.offsetWidth;
  c.classList.remove("noanim");
  requestAnimationFrame(() => c.style.setProperty("--i", to));
}
/* Money counter tween */
function tween(el, from, to){
  if (!el) return;
  if (from == null || RM || from === to){ el.textContent = fmt$(to); return; }
  const t0 = performance.now(), dur = 420;
  function step(now){
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = p < 1 ? "$" + Math.round(from + (to - from) * e) : fmt$(to);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function go(tab){
  if (S.tab === tab){ window.scrollTo({ top:0, behavior: RM ? "auto" : "smooth" }); return; }
  if (S.sheet){ S.sheet = false; V("sheetRoot").innerHTML = ""; }
  S.tab = tab; save();
  vt(() => { render(); window.scrollTo(0, 0); });
  if (tab === "cook") reqWake(); else relWake();
}

/* ---------- SHOP ---------- */
function renderShop(){
  const c = calc();
  const shop = DATA.shops.find(s => s.id === S.shop);
  let h = '<div class="chips">' + DATA.shops.map(s =>
    `<button class="chip ${s.id===S.shop?'on':''}" onclick="setShop('${s.id}')">${DATA.shopNames[s.id]}</button>`).join('') + '</div>';

  const spentW = Math.min(100, c.spent / S.target * 100);
  const projW  = Math.min(100, c.proj  / S.target * 100);
  const pSW = T.prevSpentW == null ? spentW : T.prevSpentW;
  const pPW = T.prevProjW  == null ? projW  : T.prevProjW;
  const tgtHtml = S.editTarget
    ? `<input class="tgt-input" id="tgtIn" inputmode="numeric" value="${S.target}" onblur="commitTarget()" onkeydown="if(event.key==='Enter')this.blur()">`
    : `<button class="pill-btn" onclick="S.editTarget=true;render();">target ${fmt$(S.target)} ✎</button>`;
  h += `<div class="gauge ${c.state}">
    <div class="gauge-top">
      <div><div class="gauge-lbl">Projected · month</div><div class="gauge-num main" id="gProj">${fmt$(c.proj)}</div></div>
      <div style="text-align:right"><div class="gauge-lbl">Spent</div><div class="gauge-num sm" id="gSpent">${fmt$(c.spent)}</div></div>
    </div>
    <div class="bar"><div class="bar-est" id="barEst" data-w="${projW}" style="width:${pPW}%"></div><div class="bar-fill" id="barFill" data-w="${spentW}" style="width:${pSW}%"></div></div>
    <div class="gauge-meta">est. remaining ${fmt$(c.left)} · ${c.state==="over" ? "projected " + fmt$(c.proj - S.target) + " over target" : c.state==="warn" ? "inside $30 of target" : "on pace"}</div>
    <div class="gauge-actions">${tgtHtml}<button class="pill-btn ${c.state!=="ok"?"hot":""}" onclick="openSheet()">Triage</button></div>
  </div>`;

  shop.sections.forEach(sec => {
    const done = sec.items.filter(i => S.checks[i.id]).length;
    const open = !S.coll[shop.id + sec.name];
    h += `<div class="sec"><button class="sec-h" onclick="tglSec('${shop.id + sec.name}')">
      <span class="sec-nm">${sec.name}</span>
      <span class="cnt">${done}/${sec.items.length}<span class="chev ${open?"open":""}">${CHEV}</span></span></button>`;
    if (open) h += '<div class="group">' + sec.items.map(itemRow).join('') + '</div>';
    h += '</div>';
  });

  if (shop.id !== "big"){
    const def = allItems().filter(it => S.skips[it.id] && it.d === shop.id);
    if (def.length){
      h += `<div class="sec"><div class="sec-h"><span class="sec-nm">Deferred here</span><span class="cnt">${def.length} from Big Shop</span></div><div class="group">` + def.map(itemRow).join('') + '</div></div>';
    }
  }
  return h;
}
function itemRow(it){
  const done = !!S.checks[it.id], skip = !!S.skips[it.id];
  const noteBits = [];
  if (it.q) noteBits.push(it.q);
  if (skip) noteBits.push(`<span class="skiplbl">skipped${it.d ? " · at the " + DATA.shopNames[it.d] + " shop" : ""}</span>`);
  else if (it.note) noteBits.push(it.note);
  const priceHtml = S.editing === it.id
    ? `<span class="price entered"><input id="pIn" inputmode="decimal" value="${priceOf(it)}" onblur="commitPrice('${it.id}')" onkeydown="if(event.key==='Enter')this.blur()"></span>`
    : `<button class="price ${S.prices[it.id]!==undefined?"entered":""}" onclick="S.editing='${it.id}';render();">${fmt$(priceOf(it))}</button>`;
  return `<div class="row ${done?"done":""} ${skip?"skipped":""}">
    <button class="ck ${T.pop===it.id?"pop-in":""}" aria-label="Toggle ${it.n}" onclick="tglCheck('${it.id}')">${CKSVG}</button>
    <div class="mid"><div class="nm">${it.n}</div>${noteBits.length?`<div class="nt">${noteBits.join(" · ")}</div>`:""}</div>
    ${priceHtml}</div>`;
}
function setShop(id){ S.shop = id; save(); render(); }
function tglSec(k){ S.coll[k] = !S.coll[k]; save(); render(); }
function tglCheck(id){
  if (S.skips[id]) { delete S.skips[id]; }
  else S.checks[id] = !S.checks[id] || undefined;
  if (S.checks[id] === undefined) delete S.checks[id];
  T.pop = id; save(); render();
}
function commitPrice(id){
  const v = parseFloat(V("pIn").value.replace(/[^0-9.]/g,""));
  if (!isNaN(v)) S.prices[id] = v;
  S.editing = null; save(); render();
}
function commitTarget(){
  const v = parseInt(V("tgtIn").value.replace(/[^0-9]/g,""));
  if (!isNaN(v) && v > 0) S.target = v;
  S.editTarget = false; save(); render();
}

/* ---------- TRIAGE SHEET ---------- */
function sheetInner(){
  const c = calc();
  const shop = DATA.shops.find(s => s.id === S.shop);
  const pool = []; shop.sections.forEach(sec => sec.items.forEach(it => pool.push(it)));
  const t4 = pool.filter(it => !S.checks[it.id] && !S.skips[it.id] && it.t === 4);
  const t3 = pool.filter(it => !S.checks[it.id] && !S.skips[it.id] && it.t === 3);
  const skipped = pool.filter(it => S.skips[it.id]);
  const row = (it, undo) => `<div class="trow"><div class="mid"><div class="nm">${it.n}</div>
    <div class="why">${undo ? "skipped" : (it.t===3 ? "defer" + (it.d ? " to the " + DATA.shopNames[it.d] + " shop" : "") : (it.note || "drops without breaking a night"))}</div></div>
    <div class="sv">${undo?"":"-"}${fmt$(priceOf(it))}</div>
    <button class="skipbtn ${undo?"undo":""}" onclick="tglSkip('${it.id}')">${undo?"Undo":"Skip"}</button></div>`;
  let h = `<h2>Triage · ${DATA.shopNames[shop.id]}</h2>
    <div class="sub">Projected ${fmt$(c.proj)} against a ${fmt$(S.target)} target. Proteins, braise aromatics, and bags never show up here.</div>`;
  if (!t4.length && !t3.length && !skipped.length) h += '<div class="empty">Nothing left to cut in this shop. Structural items only.</div>';
  if (t4.length) h += '<div class="tierlbl">Drop · nothing breaks</div><div class="tgroup">' + t4.map(it => row(it,false)).join('') + '</div>';
  if (t3.length) h += '<div class="tierlbl">Defer · same month, later window</div><div class="tgroup">' + t3.map(it => row(it,false)).join('') + '</div>';
  if (skipped.length) h += '<div class="tierlbl">Skipped</div><div class="tgroup">' + skipped.map(it => row(it,true)).join('') + '</div>';
  return h;
}
function openSheet(){
  S.sheet = true; save();
  V("sheetRoot").innerHTML = `<div class="sheet-wrap" id="sheetWrap">
    <div class="sheet-scrim" onclick="closeSheet()"></div>
    <div class="sheet" role="dialog" aria-label="Triage">
      <button class="grabber" aria-label="Close triage" onclick="closeSheet()"></button>
      <div id="sheetContent">${sheetInner()}</div>
    </div></div>`;
  if (RM){ V("sheetWrap").classList.add("in"); return; }
  requestAnimationFrame(() => requestAnimationFrame(() => { const w = V("sheetWrap"); if (w) w.classList.add("in"); }));
}
function closeSheet(){
  S.sheet = false; save();
  const w = V("sheetWrap"); if (!w){ return; }
  if (RM){ V("sheetRoot").innerHTML = ""; return; }
  w.classList.remove("in");
  setTimeout(() => { V("sheetRoot").innerHTML = ""; }, 440);
}
function tglSkip(id){
  if (S.skips[id]) delete S.skips[id]; else { S.skips[id] = true; delete S.checks[id]; }
  save(); render();
  if (S.sheet){ const sc = V("sheetContent"); if (sc) sc.innerHTML = sheetInner(); }
}

/* ---------- COOK ---------- */
function renderCook(){
  const ses = DATA.sessions.find(s => s.id === S.session);
  let h = `<div class="segc" id="segS" style="--n:3; --i:${S.session-1}"><span class="seg-thumb"></span>` +
    DATA.sessions.map(s => `<button class="seg-opt ${s.id===S.session?"on":""}" onclick="setSession(${s.id})">${s.name}</button>`).join('') + '</div>';
  h += `<div class="wake ${wakeOn?"on":""}" id="wakePill"><span class="dot"></span>${wakeMsg()}</div>`;
  h += `<h2 class="ses-h">${ses.name} · ${ses.tag}</h2><p class="snote">${ses.note}</p>`;
  h += `<div class="segc" id="segP" style="--n:2; --i:${S.phase==="prep"?0:1}"><span class="seg-thumb"></span>
    <button class="seg-opt ${S.phase==="prep"?"on":""}" onclick="setPhase('prep')">Prep + Route</button>
    <button class="seg-opt ${S.phase==="fire"?"on":""}" onclick="setPhase('fire')">Fire</button></div>`;
  if (S.phase === "prep"){
    h += '<div class="prep-group">' + ses.prep.map(p => {
      const k = "s"+ses.id+"-"+p.id, done = !!S.prep[k];
      return `<button class="prep ${done?"done":""}" onclick="tglPrep('${k}')"><span class="ck ${T.pop===k?"pop-in":""}">${CKSVG}</span><span class="tx">${vfy(p.tx)}</span></button>`;
    }).join('') + '</div>';
  } else {
    h += '<div class="rail-h"><span>On the rail</span><div class="ln"></div><span>tap: fire · tap again: punch</span></div>';
    h += ses.fire.map((f,i) => {
      const k = "s"+ses.id+"-"+f.id, st = S.fire[k]||0;
      return `<button class="ticket ${st===1?"active":st===2?"done":""}" onclick="cyc('${k}')">
        <div class="t-top"><span class="t-num">${String(i+1).padStart(2,"0")}</span><span class="t-type ${f.type}">${f.type.toUpperCase()}</span><span class="t-dur">${f.dur}</span></div>
        <div class="t-title">${f.title}</div><div class="t-detail">${vfy(f.detail)}</div>
        ${st===1?'<div class="t-state">FIRING</div>':st===2?'<div class="t-state">PUNCHED ✓</div>':""}</button>`;
    }).join('');
  }
  return h;
}
function setSession(id){
  if (id === S.session) return;
  const from = S.session - 1;
  S.session = id; save(); render();
  glide("segS", from, id - 1);
}
function setPhase(p){
  if (p === S.phase) return;
  const from = S.phase === "prep" ? 0 : 1;
  S.phase = p; save(); render();
  glide("segP", from, p === "prep" ? 0 : 1);
  if (p === "fire") reqWake();
}
function tglPrep(k){ S.prep[k] = !S.prep[k] || undefined; if (S.prep[k]===undefined) delete S.prep[k]; T.pop = k; save(); render(); }
function cyc(k){ S.fire[k] = ((S.fire[k]||0) + 1) % 3; save(); render(); }

/* ---------- FREEZER ---------- */
function renderFreeze(){
  const n = DATA.manifest.filter(m => S.bags[m.d]).length;
  let h = `<div class="fz-head"><div class="fz-count">${n}<span class="of"> / 30</span></div>
    <div class="fz-sub ${n===30?"fz-done":""}">${n===30 ? "Validated for Day 1 🎉 Set the 9pm thaw alarm." : "sealed, labeled, and in the freezer"}</div>
    <div class="fz-track"><i style="width:${n/30*100}%"></i></div></div>`;
  h += '<div class="fz-grid">' + DATA.manifest.map(m =>
    `<button class="bag ${S.bags[m.d]?"in":""} ${T.pop===("b"+m.d)?"pop-in":""}" onclick="tglBag(${m.d})"><span class="d">Day ${m.d}</span><span class="n">${m.n} · S${m.s}</span></button>`).join('') + '</div>';
  return h;
}
function tglBag(d){ S.bags[d] = !S.bags[d] || undefined; if (S.bags[d]===undefined) delete S.bags[d]; T.pop = "b"+d; save(); render(); }

/* ---------- WAKE LOCK ---------- */
let wakeLock = null, wakeOn = false;
function wakeMsg(){ return !("wakeLock" in navigator) ? "wake lock unsupported: use Settings to keep screen on" : (wakeOn ? "screen staying awake" : "screen awake on next tap"); }
async function reqWake(){
  if (!("wakeLock" in navigator)) return updWake();
  try { wakeLock = await navigator.wakeLock.request("screen"); wakeOn = true;
    wakeLock.addEventListener("release", () => { wakeOn = false; updWake(); });
  } catch(e){ wakeOn = false; }
  updWake();
}
function relWake(){ if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; } wakeOn = false; }
function updWake(){ const p = V("wakePill"); if (p){ p.className = "wake" + (wakeOn?" on":""); p.innerHTML = '<span class="dot"></span>' + wakeMsg(); } }
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible" && S.tab === "cook") reqWake(); });

/* ---------- ROOT ---------- */
function render(){
  ["Shop","Cook","Freeze"].forEach(t => {
    const btn = V("tab"+t), on = S.tab === t.toLowerCase();
    btn.classList.toggle("on", on);
    btn.querySelector(".tb-pill").hidden = !on;
  });
  V("ltTitle").textContent = TITLES[S.tab];
  V("tbTitle").textContent = TITLES[S.tab];
  V("view").innerHTML = S.tab === "shop" ? renderShop() : S.tab === "cook" ? renderCook() : renderFreeze();
  afterRender();
}
function afterRender(){
  T.pop = null;
  const gp = V("gProj");
  if (gp){
    const c = calc();
    const spentW = Math.min(100, c.spent / S.target * 100);
    const projW  = Math.min(100, c.proj  / S.target * 100);
    tween(gp, T.prevProj, c.proj);
    tween(V("gSpent"), T.prevSpent, c.spent);
    const bf = V("barFill"), be = V("barEst");
    requestAnimationFrame(() => { if (bf) bf.style.width = spentW + "%"; if (be) be.style.width = projW + "%"; });
    T.prevProj = c.proj; T.prevSpent = c.spent; T.prevSpentW = spentW; T.prevProjW = projW;
  }
  if (S.editing){ const i = V("pIn"); if (i){ i.focus(); i.select(); } }
  if (S.editTarget){ const i = V("tgtIn"); if (i){ i.focus(); i.select(); } }
}

/* Collapsing large title */
const ltTitleEl = V("ltTitle"), topbarEl = V("topbar");
function onScroll(){
  const r = ltTitleEl.getBoundingClientRect();
  topbarEl.classList.toggle("scrolled", r.bottom <= topbarEl.offsetHeight - 6);
}
window.addEventListener("scroll", onScroll, { passive:true });

render();
onScroll();
</script>
</body>
