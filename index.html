<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Back of House · Round 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper: oklch(97% 0.012 95);
  --card: oklch(98.5% 0.008 95);
  --tint: oklch(93.5% 0.02 108);
  --line: oklch(86% 0.022 108);
  --ink: oklch(25% 0.02 120);
  --ink-soft: oklch(44% 0.02 120);
  --olive: oklch(45% 0.075 125);
  --olive-deep: oklch(36% 0.06 125);
  --orange: oklch(64% 0.155 48);
  --orange-tint: oklch(94% 0.035 60);
  --ok: oklch(50% 0.1 145);
  --warn: oklch(62% 0.12 75);
  --warn-tint: oklch(94% 0.05 85);
  --over: oklch(52% 0.18 28);
  --over-tint: oklch(93% 0.045 30);
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px; --s7: 48px;
  --r: 14px;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  font-family:'Atkinson Hyperlegible', system-ui, sans-serif;
  background:var(--paper); color:var(--ink);
  font-size:17px; line-height:1.45;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
  overscroll-behavior-y:none;
}
button{ font:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer; text-align:left; }
h1,h2,h3{ font-family:'Bricolage Grotesque', Georgia, serif; margin:0; }
input{ font:inherit; color:inherit; }

/* Header */
.hdr{ padding:calc(var(--s4) + env(safe-area-inset-top)) var(--s4) var(--s3); display:flex; align-items:baseline; justify-content:space-between; gap:var(--s3); }
.hdr h1{ font-size:26px; font-weight:800; letter-spacing:-0.01em; }
.hdr .sub{ font-size:13px; color:var(--ink-soft); font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
main{ padding:0 var(--s4); max-width:640px; margin:0 auto; }

/* Segmented control */
.seg{ display:flex; gap:var(--s1); background:var(--tint); border:1px solid var(--line); border-radius:12px; padding:var(--s1); margin:var(--s2) 0 var(--s4); overflow-x:auto; }
.seg button{ flex:1; min-width:max-content; padding:10px 12px; border-radius:9px; font-weight:700; font-size:15px; color:var(--ink-soft); white-space:nowrap; }
.seg button.on{ background:var(--olive); color:var(--paper); }

/* Budget gauge */
.gauge{ background:var(--card); border:1.5px solid var(--line); border-radius:var(--r); padding:var(--s4); margin-bottom:var(--s4); position:sticky; top:var(--s2); z-index:5; box-shadow:0 6px 18px oklch(25% 0.02 120 / 0.07); }
.gauge.warn{ border-color:var(--warn); background:var(--warn-tint); }
.gauge.over{ border-color:var(--over); background:var(--over-tint); }
.gauge-top{ display:flex; justify-content:space-between; align-items:baseline; gap:var(--s3); }
.gauge-num{ font-family:'Bricolage Grotesque'; font-size:34px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
.gauge.warn .gauge-num{ color:var(--warn); }
.gauge.over .gauge-num{ color:var(--over); }
.gauge-lbl{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); }
.gauge-meta{ font-size:14px; color:var(--ink-soft); margin-top:var(--s2); font-variant-numeric:tabular-nums; }
.bar{ height:12px; background:var(--tint); border-radius:99px; margin-top:var(--s3); position:relative; overflow:hidden; border:1px solid var(--line); }
.bar-fill{ position:absolute; inset:0 auto 0 0; background:var(--olive); border-radius:99px; transition:width .35s cubic-bezier(.22,1,.36,1); }
.gauge.warn .bar-fill{ background:var(--warn); }
.gauge.over .bar-fill{ background:var(--over); }
.bar-est{ position:absolute; inset:0 auto 0 0; background:var(--olive); opacity:0.32; border-radius:99px; transition:width .35s cubic-bezier(.22,1,.36,1); }
.gauge.warn .bar-est{ background:var(--warn); }
.gauge.over .bar-est{ background:var(--over); }
.gauge-actions{ display:flex; gap:var(--s3); margin-top:var(--s3); }
.chip-btn{ font-size:14px; font-weight:700; padding:8px 14px; border-radius:99px; border:1.5px solid var(--line); background:var(--card); }
.chip-btn.hot{ border-color:var(--over); color:var(--over); }
.tgt-input{ width:76px; border:1.5px solid var(--line); border-radius:8px; padding:4px 8px; font-weight:700; background:var(--card); }

/* Sections + shop items */
.sec{ margin-bottom:var(--s4); }
.sec-h{ width:100%; display:flex; justify-content:space-between; align-items:center; padding:var(--s3) var(--s2); font-family:'Bricolage Grotesque'; font-size:18px; font-weight:700; }
.sec-h .cnt{ font-family:'Atkinson Hyperlegible'; font-size:13px; font-weight:700; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
.items{ display:flex; flex-direction:column; gap:var(--s2); }
.item{ display:flex; align-items:center; gap:var(--s3); background:var(--card); border:1.5px solid var(--line); border-radius:var(--r); padding:var(--s3) var(--s3); min-height:64px; }
.item .ck{ width:44px; height:44px; min-width:44px; border-radius:50%; border:2.5px solid var(--olive); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--paper); font-weight:700; }
.item.done{ background:var(--tint); }
.item.done .ck{ background:var(--olive); border-color:var(--olive); }
.item.done .nm{ text-decoration:line-through; color:var(--ink-soft); }
.item.skipped{ opacity:0.55; }
.item.skipped .nm{ text-decoration:line-through; }
.item .mid{ flex:1; min-width:0; }
.item .nm{ font-weight:700; font-size:16px; }
.item .nt{ font-size:13.5px; color:var(--ink-soft); margin-top:1px; }
.item .nt .skiplbl{ color:var(--over); font-weight:700; }
.price{ min-width:74px; text-align:center; font-weight:700; font-variant-numeric:tabular-nums; padding:10px 8px; border-radius:10px; background:var(--tint); border:1.5px solid var(--line); font-size:15.5px; }
.price.entered{ background:var(--orange-tint); border-color:var(--orange); }
.price input{ width:60px; border:none; background:transparent; text-align:center; font-weight:700; }

/* Triage sheet */
.sheet-scrim{ position:fixed; inset:0; background:oklch(25% 0.02 120 / 0.35); z-index:40; }
.sheet{ position:fixed; left:0; right:0; bottom:0; z-index:41; background:var(--card); border-radius:20px 20px 0 0; border-top:2px solid var(--line); max-height:72vh; overflow-y:auto; padding:var(--s4) var(--s4) calc(var(--s5) + env(safe-area-inset-bottom)); }
.sheet h2{ font-size:22px; font-weight:800; }
.sheet .sub{ font-size:14px; color:var(--ink-soft); margin:var(--s2) 0 var(--s4); }
.trow{ display:flex; align-items:center; gap:var(--s3); padding:var(--s3) 0; border-top:1px solid var(--line); }
.trow .mid{ flex:1; }
.trow .nm{ font-weight:700; }
.trow .why{ font-size:13.5px; color:var(--ink-soft); }
.trow .sv{ font-weight:800; font-variant-numeric:tabular-nums; color:var(--olive-deep); min-width:52px; text-align:right; }
.skipbtn{ font-size:14px; font-weight:700; padding:10px 14px; border-radius:99px; border:1.5px solid var(--over); color:var(--over); min-height:44px; }
.skipbtn.undo{ border-color:var(--olive); color:var(--olive-deep); }
.tierlbl{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin:var(--s4) 0 var(--s2); }

/* Cook zone */
.phase{ display:flex; gap:var(--s2); margin-bottom:var(--s4); }
.phase button{ flex:1; text-align:center; padding:14px; border-radius:var(--r); border:1.5px solid var(--line); font-weight:800; font-family:'Bricolage Grotesque'; font-size:17px; background:var(--card); }
.phase button.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.wake{ display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:var(--ink-soft); padding:6px 12px; border:1.5px solid var(--line); border-radius:99px; margin-bottom:var(--s3); }
.wake .dot{ width:9px; height:9px; border-radius:50%; background:var(--line); }
.wake.on .dot{ background:var(--ok); }
.snote{ font-size:14px; color:var(--ink-soft); margin:0 0 var(--s4); }

/* Prep rows */
.prep{ display:flex; align-items:flex-start; gap:var(--s3); background:var(--card); border:1.5px solid var(--line); border-radius:var(--r); padding:var(--s4); min-height:64px; margin-bottom:var(--s2); }
.prep .ck{ width:44px; height:44px; min-width:44px; border-radius:12px; border:2.5px solid var(--olive); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--paper); font-weight:700; margin-top:2px; }
.prep.done{ background:var(--tint); }
.prep.done .ck{ background:var(--olive); border-color:var(--olive); }
.prep.done .tx{ color:var(--ink-soft); }
.prep .tx{ flex:1; font-size:16px; }
.prep .tx b{ font-weight:700; }
.vtag{ display:inline-block; font-size:11.5px; font-weight:800; letter-spacing:0.05em; background:var(--olive); color:var(--paper); border-radius:6px; padding:2px 7px; margin:0 1px; vertical-align:1px; }

/* Ticket rail */
.rail-h{ display:flex; align-items:center; gap:var(--s3); margin:var(--s2) 0 var(--s3); }
.rail-h .ln{ flex:1; height:2px; background:var(--line); }
.rail-h span{ font-size:12px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-soft); }
.ticket{ position:relative; width:100%; background:var(--card); border:1.5px solid var(--line); border-radius:6px 16px 16px 6px; padding:var(--s4) var(--s4) var(--s4) var(--s5); margin-bottom:var(--s3); display:block; }
.ticket::before{ content:''; position:absolute; left:10px; top:16px; width:9px; height:9px; border-radius:50%; background:var(--paper); border:2px solid var(--line); }
.ticket.active{ border-color:var(--orange); border-width:2.5px; background:var(--orange-tint); }
.ticket.active::before{ border-color:var(--orange); background:var(--orange); }
.ticket.done{ opacity:0.5; }
.ticket.done::before{ background:var(--olive); border-color:var(--olive); }
.t-top{ display:flex; align-items:center; gap:var(--s2); margin-bottom:6px; flex-wrap:wrap; }
.t-num{ font-family:'Bricolage Grotesque'; font-weight:800; font-size:15px; color:var(--ink-soft); }
.t-type{ font-size:11px; font-weight:800; letter-spacing:0.09em; padding:3px 8px; border-radius:5px; background:var(--tint); border:1px solid var(--line); }
.t-type.grill,.t-type.stove{ background:var(--orange-tint); border-color:var(--orange); color:oklch(45% 0.13 45); }
.t-type.seal{ background:oklch(93% 0.03 145); border-color:var(--ok); color:var(--ok); }
.t-type.close{ background:var(--ink); border-color:var(--ink); color:var(--paper); }
.t-dur{ margin-left:auto; font-size:13px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink-soft); }
.t-title{ font-family:'Bricolage Grotesque'; font-size:19px; font-weight:700; line-height:1.2; }
.ticket.done .t-title{ text-decoration:line-through; }
.t-detail{ font-size:15px; color:var(--ink-soft); margin-top:5px; }
.t-state{ position:absolute; right:12px; bottom:10px; font-size:11px; font-weight:800; letter-spacing:0.1em; color:var(--orange); }
.ticket.done .t-state{ color:var(--olive); }

/* Freezer */
.fz-head{ text-align:center; margin:var(--s3) 0 var(--s4); }
.fz-count{ font-family:'Bricolage Grotesque'; font-size:44px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
.fz-sub{ font-size:14px; color:var(--ink-soft); font-weight:700; margin-top:4px; }
.fz-done{ color:var(--ok); font-weight:800; }
.fz-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:var(--s2); }
.bag{ min-height:72px; border:1.5px solid var(--line); border-radius:var(--r); background:var(--card); padding:var(--s3); display:flex; flex-direction:column; justify-content:center; }
.bag .d{ font-family:'Bricolage Grotesque'; font-weight:800; font-size:17px; }
.bag .n{ font-size:12.5px; color:var(--ink-soft); line-height:1.25; margin-top:2px; }
.bag.in{ background:var(--olive); border-color:var(--olive-deep); }
.bag.in .d, .bag.in .n{ color:var(--paper); }
.bag.in .n{ opacity:0.85; }

/* Tab bar */
.tabbar{ position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; background:var(--card); border-top:1.5px solid var(--line); padding:var(--s2) var(--s3) calc(var(--s2) + env(safe-area-inset-bottom)); }
.tabbar button{ flex:1; text-align:center; padding:10px 4px; border-radius:12px; font-weight:800; font-family:'Bricolage Grotesque'; font-size:16px; color:var(--ink-soft); }
.tabbar button.on{ background:var(--tint); color:var(--ink); }
.tabbar .ic{ display:block; font-size:20px; margin-bottom:1px; }
.empty{ text-align:center; color:var(--ink-soft); padding:var(--s6) var(--s4); font-size:15px; }
@media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

const V = el => document.getElementById(el);
const vfy = s => s.replace(/\{([A-Z ]+)\}/g, '<span class="vtag">$1</span>');
function fmt$(n){ return "$" + (Math.round(n*100)%100 === 0 ? Math.round(n) : n.toFixed(2)); }
function priceOf(it){ return (S.prices[it.id] !== undefined) ? S.prices[it.id] : it.e; }
function allItems(){ const out=[]; DATA.shops.forEach(sh => sh.sections.forEach(sec => sec.items.forEach(it => out.push(it)))); return out; }
function calc(){
  let spent=0, left=0;
  allItems().forEach(it => {
    if (S.checks[it.id]) spent += priceOf(it);
    else if (!S.skips[it.id]) left += priceOf(it);
  });
  const proj = spent + left;
  const state = proj > S.target ? "over" : (proj > S.target - 30 ? "warn" : "ok");
  return { spent, left, proj, state };
}

function go(tab){ S.tab = tab; S.sheet = false; save(); render(); if (tab === "cook") reqWake(); else relWake(); }

function renderShop(){
  const c = calc();
  const shop = DATA.shops.find(s => s.id === S.shop);
  let h = '<div class="seg">' + DATA.shops.map(s =>
    `<button class="${s.id===S.shop?'on':''}" onclick="setShop('${s.id}')">${DATA.shopNames[s.id]}</button>`).join('') + '</div>';

  const spentW = Math.min(100, c.spent / S.target * 100);
  const projW  = Math.min(100, c.proj  / S.target * 100);
  const tgtHtml = S.editTarget
    ? `<input class="tgt-input" id="tgtIn" inputmode="numeric" value="${S.target}" onblur="commitTarget()" onkeydown="if(event.key==='Enter')this.blur()">`
    : `<button class="chip-btn" onclick="S.editTarget=true;render();">target ${fmt$(S.target)} ✎</button>`;
  h += `<div class="gauge ${c.state}">
    <div class="gauge-top"><div><div class="gauge-lbl">Projected month</div><div class="gauge-num">${fmt$(c.proj)}</div></div>
    <div style="text-align:right"><div class="gauge-lbl">Spent</div><div class="gauge-num" style="font-size:22px">${fmt$(c.spent)}</div></div></div>
    <div class="bar"><div class="bar-est" style="width:${projW}%"></div><div class="bar-fill" style="width:${spentW}%"></div></div>
    <div class="gauge-meta">est. remaining ${fmt$(c.left)} · ${c.state==="over" ? "projected " + fmt$(c.proj - S.target) + " over target" : c.state==="warn" ? "inside $30 of target" : "on pace"}</div>
    <div class="gauge-actions">${tgtHtml}<button class="chip-btn ${c.state!=="ok"?"hot":""}" onclick="S.sheet=true;render();">Triage ▲</button></div>
  </div>`;

  shop.sections.forEach(sec => {
    const done = sec.items.filter(i => S.checks[i.id]).length;
    const open = !S.coll[shop.id + sec.name];
    h += `<div class="sec"><button class="sec-h" onclick="tglSec('${shop.id + sec.name}')"><span>${sec.name}</span><span class="cnt">${done}/${sec.items.length} ${open?"▾":"▸"}</span></button>`;
    if (open) h += '<div class="items">' + sec.items.map(itemRow).join('') + '</div>';
    h += '</div>';
  });

  if (shop.id !== "big"){
    const def = allItems().filter(it => S.skips[it.id] && it.d === shop.id);
    if (def.length){
      h += `<div class="sec"><button class="sec-h"><span>Deferred here</span><span class="cnt">${def.length} from Big Shop</span></button><div class="items">` + def.map(itemRow).join('') + '</div></div>';
    }
  }
  return h;
}
function itemRow(it){
  const done = !!S.checks[it.id], skip = !!S.skips[it.id];
  const noteBits = [];
  if (it.q) noteBits.push(it.q);
  if (skip) noteBits.push(`<span class="skiplbl">skipped${it.d ? " · at the " + DATA.shopNames[it.d] + " shop" : ""}</span>`);
  else if (it.note) noteBits.push(it.note);
  const priceHtml = S.editing === it.id
    ? `<span class="price entered"><input id="pIn" inputmode="decimal" value="${priceOf(it)}" onblur="commitPrice('${it.id}')" onkeydown="if(event.key==='Enter')this.blur()"></span>`
    : `<button class="price ${S.prices[it.id]!==undefined?"entered":""}" onclick="S.editing='${it.id}';render();">${fmt$(priceOf(it))}</button>`;
  return `<div class="item ${done?"done":""} ${skip?"skipped":""}">
    <button class="ck" onclick="tglCheck('${it.id}')">${done?"✓":""}</button>
    <div class="mid"><div class="nm">${it.n}</div>${noteBits.length?`<div class="nt">${noteBits.join(" · ")}</div>`:""}</div>
    ${priceHtml}</div>`;
}
function setShop(id){ S.shop = id; save(); render(); }
function tglSec(k){ S.coll[k] = !S.coll[k]; save(); render(); }
function tglCheck(id){
  if (S.skips[id]) { delete S.skips[id]; }

  if (S.checks[id] === undefined) delete S.checks[id];

}
function commitPrice(id){

}
function commitTarget(){
  const v = parseInt(V("tgtIn").value.replace(/[^0-9]/g,""));
  if (!isNaN(v) && v > 0) S.target = v;
  S.editTarget = false; save(); render();
}

/* ---------- TRIAGE ---------- */
function renderSheet(){
  const c = calc();
  const shop = DATA.shops.find(s => s.id === S.shop);
  const pool = []; shop.sections.forEach(sec => sec.items.forEach(it => pool.push(it)));
  const t4 = pool.filter(it => !S.checks[it.id] && !S.skips[it.id] && it.t === 4);
  const t3 = pool.filter(it => !S.checks[it.id] && !S.skips[it.id] && it.t === 3);
  const skipped = pool.filter(it => S.skips[it.id]);
  const row = (it, undo) => `<div class="trow"><div class="mid"><div class="nm">${it.n}</div>
    <div class="why">${undo ? "skipped" : (it.t===3 ? "defer" + (it.d ? " to the " + DATA.shopNames[it.d] + " shop" : "") : (it.note || "drops without breaking a night"))}</div></div>
    <div class="sv">${undo?"":"-"}${fmt$(priceOf(it))}</div>
    <button class="skipbtn ${undo?"undo":""}" onclick="tglSkip('${it.id}')">${undo?"Undo":"Skip"}</button></div>`;
  let h = `<div class="sheet-scrim" onclick="S.sheet=false;render();"></div><div class="sheet">
    <h2>Triage · ${DATA.shopNames[shop.id]}</h2>
    <div class="sub">Projected ${fmt$(c.proj)} against a ${fmt$(S.target)} target. Proteins, braise aromatics, and bags never show up here.</div>`;
  if (!t4.length && !t3.length && !skipped.length) h += '<div class="empty">Nothing left to cut in this shop. Structural items only.</div>';
  if (t4.length) h += '<div class="tierlbl">Drop · nothing breaks</div>' + t4.map(it => row(it,false)).join('');
  if (t3.length) h += '<div class="tierlbl">Defer · same month, later window</div>' + t3.map(it => row(it,false)).join('');
  if (skipped.length) h += '<div class="tierlbl">Skipped</div>' + skipped.map(it => row(it,true)).join('');
  return h + '</div>';
}
function tglSkip(id){ if (S.skips[id]) delete S.skips[id]; else { S.skips[id] = true; delete S.checks[id]; } save(); render(); }

/* ---------- COOK ---------- */
function renderCook(){
  const ses = DATA.sessions.find(s => s.id === S.session);
  let h = '<div class="seg">' + DATA.sessions.map(s =>
    `<button class="${s.id===S.session?'on':''}" onclick="S.session=${s.id};save();render();">${s.name}</button>`).join('') + '</div>';
  h += `<div class="wake ${wakeOn?"on":""}" id="wakePill"><span class="dot"></span>${wakeMsg()}</div>`;
  h += `<h2 style="font-size:22px;font-weight:800;">${ses.name} · ${ses.tag}</h2><p class="snote">${ses.note}</p>`;
  h += `<div class="phase">
    <button class="${S.phase==="prep"?"on":""}" onclick="S.phase='prep';save();render();">Prep + Route</button>
    <button class="${S.phase==="fire"?"on":""}" onclick="S.phase='fire';save();render();reqWake();">Fire</button></div>`;
  if (S.phase === "prep"){
    h += ses.prep.map(p => {
      const k = "s"+ses.id+"-"+p.id, done = !!S.prep[k];
      return `<button class="prep ${done?"done":""}" onclick="tglPrep('${k}')" style="width:100%"><span class="ck">${done?"✓":""}</span><span class="tx">${vfy(p.tx)}</span></button>`;
    }).join('');
  } else {
    h += '<div class="rail-h"><span>On the rail</span><div class="ln"></div><span>tap: fire · tap again: punch</span></div>';
    h += ses.fire.map((f,i) => {
      const k = "s"+ses.id+"-"+f.id, st = S.fire[k]||0;
      return `<button class="ticket ${st===1?"active":st===2?"done":""}" onclick="cyc('${k}')">
        <div class="t-top"><span class="t-num">${String(i+1).padStart(2,"0")}</span><span class="t-type ${f.type}">${f.type.toUpperCase()}</span><span class="t-dur">${f.dur}</span></div>
        <div class="t-title">${f.title}</div><div class="t-detail">${vfy(f.detail)}</div>
        ${st===1?'<div class="t-state">FIRING</div>':st===2?'<div class="t-state">PUNCHED ✓</div>':""}</button>`;
    }).join('');
  }
  return h;
}
function tglPrep(k){ S.prep[k] = !S.prep[k] || undefined; if (S.prep[k]===undefined) delete S.prep[k]; save(); render(); }
function cyc(k){ S.fire[k] = ((S.fire[k]||0) + 1) % 3; save(); render(); }

/* ---------- FREEZER ---------- */
function renderFreeze(){
  const n = DATA.manifest.filter(m => S.bags[m.d]).length;
  let h = `<div class="fz-head"><div class="fz-count">${n} / 30</div>
    <div class="fz-sub ${n===30?"fz-done":""}">${n===30 ? "Validated for Day 1 🎉 Set the 9pm thaw alarm." : "sealed, labeled, and in the freezer"}</div></div>`;
  h += '<div class="fz-grid">' + DATA.manifest.map(m =>
    `<button class="bag ${S.bags[m.d]?"in":""}" onclick="tglBag(${m.d})"><span class="d">Day ${m.d}</span><span class="n">${m.n} · S${m.s}</span></button>`).join('') + '</div>';
  return h;
}
function tglBag(d){ S.bags[d] = !S.bags[d] || undefined; if (S.bags[d]===undefined) delete S.bags[d]; save(); render(); }

/* ---------- WAKE LOCK ---------- */
let wakeLock = null, wakeOn = false;
function wakeMsg(){ return !("wakeLock" in navigator) ? "wake lock unsupported: use Settings to keep screen on" : (wakeOn ? "screen staying awake" : "screen awake on next tap"); }
async function reqWake(){
  if (!("wakeLock" in navigator)) return updWake();
  try { wakeLock = await navigator.wakeLock.request("screen"); wakeOn = true;
    wakeLock.addEventListener("release", () => { wakeOn = false; updWake(); });
  } catch(e){ wakeOn = false; }
  updWake();
}
function relWake(){ if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; } wakeOn = false; }
function updWake(){ const p = V("wakePill"); if (p){ p.className = "wake" + (wakeOn?" on":""); p.innerHTML = '<span class="dot"></span>' + wakeMsg(); } }
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible" && S.tab === "cook") reqWake(); });

/* ---------- ROOT ---------- */
function render(){
  ["Shop","Cook","Freeze"].forEach(t => V("tab"+t).classList.toggle("on", S.tab === t.toLowerCase()));
  let h = S.tab === "shop" ? renderShop() : S.tab === "cook" ? renderCook() : renderFreeze();
  if (S.sheet && S.tab === "shop") h += renderSheet();
  V("view").innerHTML = h;
  if (S.editing){ const i = V("pIn"); if (i){ i.focus(); i.select(); } }
  if (S.editTarget){ const i = V("tgtIn"); if (i){ i.focus(); i.select(); } }
}
render();
</script>
</body>
